<!DOCTYPE html>
<html lang="te"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSR ExamOS Ultimate - Student</title>
<link rel="stylesheet" href="style.css?v=phase1">
</head><body>
<header class="hero"><div><h1>KSR ExamOS Ultimate</h1><p>Student Portal • Secure Online Exams</p></div><a class="hero-btn" href="admin.html">Admin</a></header>
<main class="container">
<section id="loginCard" class="card">
<h2>Student Login</h2>
<label>Institute ID</label><input id="studentInstituteId" placeholder="KSR001">
<label>Exam ID</label><input id="studentExamId" placeholder="DSC001">
<label>Student Name</label><input id="studentName" placeholder="Name">
<label>Phone</label><input id="studentPhone" placeholder="Phone">
<label>Exam Code</label><input id="studentCode" placeholder="Code optional">
<button class="primary" id="startExamBtn">Start Exam</button><p id="studentMsg"></p>
</section>
<section id="examArea" class="card hidden">
<div class="top"><h2 id="examTitle">Exam</h2><div id="timer" class="timer">00:00</div></div>
<div id="questionBox"></div>
<button id="prevBtn">Previous</button><button id="markBtn">Mark</button><button id="nextBtn">Next</button><button class="danger" id="submitBtn">Submit</button>
<h3>Palette</h3><div id="palette" class="palette"></div>
</section>
<section id="resultBox" class="card hidden"></section>
</main>
<script type="module" src="student.js?v=phase1"></script>
</body></html>
