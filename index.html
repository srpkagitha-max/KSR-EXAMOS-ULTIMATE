<!DOCTYPE html><html lang="te"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR ExamOS Ultimate - Student</title><link rel="stylesheet" href="style.css?v=phase61qbankpro"></head><body>
<header class="hero"><div><h1>KSR ExamOS Ultimate</h1><p>Student Portal • Phase-6.1.1 Question Bank Pro</p></div><a class="hero-btn" href="admin.html">Admin</a></header>
<main class="container"><section id="loginCard" class="card"><h2>Student Login</h2><label>Institute ID</label><input id="studentInstituteId" placeholder="KSR001"><label>Exam ID</label><input id="studentExamId" placeholder="DSC001"><label>Student Name</label><input id="studentName" placeholder="Name"><label>Phone</label><input id="studentPhone" placeholder="Phone"><label>Student Photo URL (optional)</label><input id="studentPhoto" placeholder="Paste photo link optional"><label>Exam Code</label><input id="studentCode" placeholder="Code optional"><button class="primary" id="startExamBtn">Start / Resume Exam</button><button id="hallBtn">Show Hall Ticket</button><p id="studentMsg"></p><div id="studentTicket"></div></section>
<section id="examArea" class="card hidden"><div class="top"><h2 id="examTitle">Exam</h2><div id="timer" class="timer">00:00</div></div><div class="exam-meta"><span class="pill" id="answeredCount">Answered 0</span><span class="pill" id="reviewCount">Review 0</span><span class="pill" id="unansweredCount">Unanswered 0</span></div><div id="questionBox"></div><div class="row"><button id="prevBtn">Previous</button><button id="markBtn">Mark Review</button><button id="clearBtn">Clear Answer</button><button id="nextBtn">Next</button><button class="danger" id="submitBtn">Submit</button></div><h3>Palette</h3><div id="palette" class="palette"></div></section><section id="resultBox" class="card hidden"></section></main><script type="module" src="student.js?v=phase61qbankpro"></script></body></html>
